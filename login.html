<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Perpustakaan</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="stylee.css">
</head>
<body>

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card login-card p-4 shadow-lg">
        
        <!-- Title -->
        <h3 class="text-center mb-2 bi bi-book-half"> Perpustakaan MyPerpus</h3>
        <p class="text-center text-muted mb-4">Silakan login ke akun Anda</p>

        <form onsubmit="login(event)" autocomplete="off">
            
            <!-- Email -->
            <div class="mb-3 input-group">
                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                <input type="email" id="email" class="form-control" placeholder="Email" autocomplete="off" required>
            </div>

            <!-- Password -->
            <div class="mb-3 input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" id="password" class="form-control" placeholder="Password" autocomplete="new-password" required>
            </div>

            <!-- Button -->
            <button type="submit" class="btn btn-primary w-100 mb-3">
                Login
            </button>

            <!-- Link -->
            <p class="text-center small">
                Belum punya akun? <a href="register.html">Daftar</a>
            </p>

        </form>

        <p>
            login user email: andi@email.com pw: 123 <br>
            login admin  email: admin@email.com pw: admin
        </p>
    </div>

</div>

<script>
function login(e) {
    e.preventDefault(); // supaya tidak reload

    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    // AKUN DUMMY (sementara)
    if (email === "admin@email.com" && password === "admin") {

        localStorage.setItem("user", JSON.stringify({
            role: "admin",
            nama: "Admin",
            email: email
        }));

        window.location.href = "admin.html";
    } 
    else if (email === "andi@email.com" && password === "123") {

        localStorage.setItem("user", JSON.stringify({
            role: "user",
            nama: "andi",
            email: email
        }));

        window.location.href = "index.html";
    } 
    else {
        alert("Email atau password salah!");
    }
}
</script>

</body>
</html>
