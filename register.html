<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="stylee.css">
</head>
<body>

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card login-card p-4 shadow-lg">

        <!-- Title -->
        <h3 class="text-center mb-2 bi bi-book-half"> Daftar Akun</h3>
        <p class="text-center text-muted mb-4">Buat akun untuk mulai meminjam buku</p>

        <form autocomplete="off">

            <!-- Nama -->
            <div class="mb-3 input-group">
                <span class="input-group-text"><i class="bi bi-person"></i></span>
                <input type="text" class="form-control" placeholder="Nama lengkap" required>
            </div>

            <!-- Email -->
            <div class="mb-3 input-group">
                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                <input type="email" class="form-control" placeholder="Email" autocomplete="off" required>
            </div>

            <!-- Password -->
            <div class="mb-3 input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" class="form-control" placeholder="Password" autocomplete="new-password" required>
            </div>

            <!-- Konfirmasi Password -->
            <div class="mb-3 input-group">
                <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                <input type="password" class="form-control" placeholder="Konfirmasi password" required>
            </div>

            <!-- Button -->
            <button type="submit" class="btn btn-primary w-100 mb-3">
                Daftar
            </button>

            <!-- Link -->
            <p class="text-center small">
                Sudah punya akun? <a href="login.html">Login</a>
            </p>

        </form>

    </div>

</div>

</body>
</html>
