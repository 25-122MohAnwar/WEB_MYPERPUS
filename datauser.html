<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Data User</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icon -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="admin">

<div class="container-fluid">
    <div class="row">

        <!-- NAVBAR MOBILE (TOGGLE) -->
        <nav class="navbar navbar-dark bg-primary d-md-none">
            <div class="container-fluid">

                <!-- LOGO -->
                <span class="navbar-brand">
                <i class="bi bi-book"></i> Admin MyPerpus
                </span>

                <!-- TOMBOL TOGGLE -->
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuMobile">
                <span class="navbar-toggler-icon"></span>
                </button>

            </div>

            <!-- MENU YANG MUNCUL -->
            <div class="collapse bg-primary" id="menuMobile">
                <div class="p-3">

                <a href="admin.html" class="d-block text-white mb-2">
                    <i class="bi bi-speedometer2"></i> Dashboard
                </a>

                <a href="admindatabuku.html" class="d-block text-white mb-2">
                    <i class="bi bi-book"></i> Data Buku
                </a>

                <a href="datauser.html" class="d-block text-white mb-2">
                    <i class="bi bi-people"></i> Data User
                </a>

                <a href="peminjaman.html" class="d-block text-white mb-2">
                    <i class="bi bi-clock-history"></i> Peminjaman
                </a>

                <a href="login.html" class="d-block text-white">
                    <i class="bi bi-box-arrow-right"></i> Logout
                </a>

                </div>
            </div>
        </nav>

        <!-- SIDEBAR -->
        <div class="col-md-2 admin-sidebar d-none d-md-block">
            <h4><i class="bi bi-book"></i> Admin MyPerpus</h4>
            <hr>

            <a href="admin.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
            <a href="admindatabuku.html"><i class="bi bi-book"></i> Data Buku</a>
            <a href="datauser.html"><i class="bi bi-people"></i> Data User</a>
            <a href="peminjaman.html"><i class="bi bi-clock-history"></i> Peminjaman</a>
            <a href="login.html"><i class="bi bi-box-arrow-right"></i> Logout</a>
        </div>

        <!-- CONTENT -->
        <div class="col-md-10 p-4">

            <!-- HEADER -->
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h3>Data User</h3>
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalUser">
                    + Tambah User
                </button>
            </div>

            <!-- SEARCH -->
            <div class="input-group mb-3">
                <input type="text" class="form-control" placeholder="Cari user...">
                <button class="btn btn-outline-secondary">
                    <i class="bi bi-search"></i>
                </button>
            </div>

            <!-- TABLE -->
            <div class="card admin-card p-3">
                <table class="table table-striped">
                    <thead class="table-primary">
                        <tr>
                            <th>No</th>
                            <th>NIM</th>
                            <th>Nama</th>
                            <th>Email</th>
                            <th>Password</th>
                            <th>No HP</th>
                            <th>Status</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr>
                            <td>1</td>
                            <td>230411100001</td>
                            <td>Ahmad</td>
                            <td>ahmad@email.com</td>
                            <td>********</td>
                            <td>08123456789</td>
                            <td class="status text-success ">Aktif</td>
                            <td>
                                <button class="btn btn-warning btn-sm">Edit</button>
                                <button class="btn btn-danger btn-sm">Hapus</button>
                            </td>
                        </tr>
                    </tbody>

                </table>
            </div>

        </div>
    </div>
</div>

<!-- MODAL TAMBAH USER -->
<div class="modal fade" id="modalUser">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Tambah User</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <input type="text" class="form-control mb-2" placeholder="NIM">
        <input type="text" class="form-control mb-2" placeholder="Nama">
        <input type="email" class="form-control mb-2" placeholder="Email">
        <input type="Pw" class="form-control mb-2" placeholder="Password">
        <input type="number" class="form-control mb-2" placeholder="No HP">
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
        <button class="btn btn-primary">Simpan</button>
      </div>

    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
